name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-js:
    name: Test Node.js
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || github.event.head_commit == null || (!contains(github.event.head_commit.message, '[skip pypi]') && !contains(github.event.head_commit.message, '[skip npm]')) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || github.event.head_commit == null || (!contains(github.event.head_commit.message, '[skip pypi]') && !contains(github.event.head_commit.message, '[skip npm]')) }}
    defaults:
      run:
        working-directory: python

    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=dalux_build --cov-report=term-missing
