name: npm publish (reusable)

on:
  workflow_call:
    inputs:
      mode:
        description: "post_ci (after CI on main) | dispatch | release"
        type: string
        required: true
      release_tag:
        description: "Git tag name for release mode (e.g. v1.2.0)"
        type: string
        required: false
        default: ""
      bump:
        description: "patch | minor | major (dispatch only)"
        type: string
        required: false
        default: patch

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-registry-${{ github.sha }}-${{ inputs.mode }}
  cancel-in-progress: false

jobs:
  test-bump-build-publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/dalux-build-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.mode == 'release' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - uses: actions/setup-python@v5
        if: inputs.mode != 'release'
        with:
          python-version: "3.x"

      - name: Detect npm package changes (post-CI only)
        id: jschange
        if: inputs.mode == 'post_ci'
        run: |
          set -euo pipefail
          HEAD="$(git rev-parse HEAD)"
          if ! git rev-parse --verify "${HEAD}^" >/dev/null 2>&1; then
            echo "has_js=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "${HEAD}^..${HEAD}" | grep -qE '^(package\.json|package-lock\.json|src/|test/)'; then
            echo "has_js=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_js=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version
        id: ver
        env:
          MODE: ${{ inputs.mode }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_BUMP: ${{ inputs.bump }}
          GHA_TARGET: dual
        run: |
          set -euo pipefail
          ROOT="$(pwd)"
          if [ "$MODE" = "release" ]; then
            VER=$(node -p "require('./package.json').version")
            echo "version=${VER}" >> "$GITHUB_OUTPUT"
            echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$MODE" = "dispatch" ]; then
            export GHA_MODE=dispatch
            python "$ROOT/.github/scripts/gh_release_version.py" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ steps.jschange.outputs.has_js }}" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # On main, publish the version committed in package.json. Version bumps
          # are intentional repository changes, not a side effect of CI.
          VER=$(node -p "require('./package.json').version")
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "bump=false" >> "$GITHUB_OUTPUT"

      - name: Apply version to package.json
        if: steps.ver.outputs.bump == 'true'
        env:
          REL_VERSION: ${{ steps.ver.outputs.version }}
        run: npm version "${REL_VERSION}" --no-git-tag-version

      - name: Install dependencies & run tests
        if: steps.ver.outputs.skip != 'true'
        run: |
          npm ci
          npm test

      - name: Check whether version is already published
        id: published
        if: steps.ver.outputs.skip != 'true'
        env:
          PACKAGE_NAME: ${{ github.event.repository.name }}
          REL_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          if npm view "dalux-build-api@${REL_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.ver.outputs.skip != 'true' && steps.published.outputs.exists != 'true'
        run: npm publish --access public

      - name: Commit version sync and push
        if: steps.ver.outputs.skip != 'true' && steps.ver.outputs.bump == 'true' && inputs.mode != 'release'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.ver.outputs.tag }} [skip npm]"
          git fetch origin main
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            git rebase origin/main
          fi
          git push origin "HEAD:refs/heads/main"
          TAG="${{ steps.ver.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.ver.outputs.skip != 'true' && steps.ver.outputs.bump == 'true' && inputs.mode != 'release'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            exit 0
          fi
          gh release create "$TAG" --title "$TAG" --generate-notes
