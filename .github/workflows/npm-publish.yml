name: Publish npm Package

# After CI succeeds on a push to main: bump package.json from the commit message,
# test, publish to npm, then push a [skip npm] sync commit (patch Z unless vX.Y or vX.Y.Z in message),
# push tag, and create a GitHub Release for that tag.
# Manual: workflow_dispatch (patch/minor/major) or release (published) → test, publish (no auto bump).

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump for package.json (manual runs only)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: npm-registry-${{ github.event.workflow_run.head_sha || github.sha }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  test-bump-build-publish:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.event == 'push')
    environment:
      name: npm
      url: https://www.npmjs.com/package/dalux-build-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event_name == 'release' && format('refs/tags/{0}', github.event.release.tag_name) || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - uses: actions/setup-python@v5
        if: github.event_name != 'release'
        with:
          python-version: "3.x"

      - name: Detect npm package changes (push → CI only)
        id: jschange
        if: github.event_name == 'workflow_run'
        run: |
          set -euo pipefail
          HEAD="$(git rev-parse HEAD)"
          if ! git rev-parse --verify "${HEAD}^" >/dev/null 2>&1; then
            echo "has_js=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "${HEAD}^..${HEAD}" | grep -qE '^(package\.json|package-lock\.json|src/|test/)'; then
            echo "has_js=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_js=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version
        id: ver
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || '' }}
          GHA_TARGET: npm
        run: |
          set -euo pipefail
          ROOT="$(pwd)"
          if [ "$EVENT_NAME" = "release" ]; then
            VER=$(node -p "require('./package.json').version")
            echo "version=${VER}" >> "$GITHUB_OUTPUT"
            echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            export GHA_MODE=dispatch
            python "$ROOT/.github/scripts/gh_release_version.py" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ steps.jschange.outputs.has_js }}" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export GHA_MODE=auto
          export COMMIT_MESSAGE="$(git log -1 --format=%B)"
          python "$ROOT/.github/scripts/gh_release_version.py" >> "$GITHUB_OUTPUT"

      - name: Apply version to package.json
        if: steps.ver.outputs.bump == 'true'
        env:
          REL_VERSION: ${{ steps.ver.outputs.version }}
        run: npm version "${REL_VERSION}" --no-git-tag-version

      - name: Install dependencies & run tests
        if: steps.ver.outputs.skip != 'true'
        run: |
          npm ci
          npm test

      - name: Publish to npm
        if: steps.ver.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version sync and push
        if: steps.ver.outputs.skip != 'true' && steps.ver.outputs.bump == 'true' && github.event_name != 'release'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.ver.outputs.tag }} [skip npm]"
          git fetch origin main
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            git rebase origin/main
          fi
          git push origin "HEAD:refs/heads/main"
          TAG="${{ steps.ver.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.ver.outputs.skip != 'true' && steps.ver.outputs.bump == 'true' && github.event_name != 'release'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            exit 0
          fi
          gh release create "$TAG" --title "$TAG" --generate-notes
