name: Publish npm Package

# Manual and tag releases call the reusable workflow (GitHub does not allow workflow_call
# in the same file as workflow_dispatch / release).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump for package.json (manual runs only)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    uses: ./.github/workflows/npm-publish-reusable.yml
    with:
      mode: ${{ github.event_name == 'release' && 'release' || 'dispatch' }}
      release_tag: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
      bump: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
    secrets: inherit
