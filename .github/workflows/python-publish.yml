name: Publish Python Package

# After CI succeeds on a push to main: bump python/pyproject.toml from the commit message,
# test, build, publish to PyPI, then push a [skip pypi] sync commit (patch Z unless vX.Y or vX.Y.Z in message).
# Manual: workflow_dispatch (patch/minor/major) or release (published) → test, build, publish (no auto bump).

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump for python/pyproject.toml (manual runs only)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: python-pypi-${{ github.event.workflow_run.head_sha || github.sha }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  test-bump-build-publish:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.event == 'push')
    environment:
      name: pypi
      url: https://pypi.org/project/dalux-build/

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event_name == 'release' && format('refs/tags/{0}', github.event.release.tag_name) || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Detect python/ changes (push → CI only)
        id: pychange
        if: github.event_name == 'workflow_run'
        run: |
          set -euo pipefail
          HEAD="$(git rev-parse HEAD)"
          if ! git rev-parse --verify "${HEAD}^" >/dev/null 2>&1; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "${HEAD}^..${HEAD}" | grep -q '^python/'; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version
        id: ver
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || '' }}
        run: |
          set -euo pipefail
          ROOT="$(pwd)"
          if [ "$EVENT_NAME" = "release" ]; then
            VER=$(grep -E '^version = ' python/pyproject.toml | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
            echo "version=${VER}" >> "$GITHUB_OUTPUT"
            echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            export GHA_MODE=dispatch
            python "$ROOT/.github/scripts/gh_release_version.py" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ steps.pychange.outputs.has_python }}" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export GHA_MODE=auto
          export COMMIT_MESSAGE="$(git log -1 --format=%B)"
          python "$ROOT/.github/scripts/gh_release_version.py" >> "$GITHUB_OUTPUT"

      - name: Apply version to pyproject.toml
        if: steps.ver.outputs.bump == 'true'
        working-directory: python
        env:
          REL_VERSION: ${{ steps.ver.outputs.version }}
        run: sed -i "s/^version = \".*\"/version = \"${REL_VERSION}\"/" pyproject.toml

      - name: Install dependencies & run tests
        if: steps.ver.outputs.skip != 'true'
        working-directory: python
        run: |
          pip install -e ".[dev]"
          pytest

      - name: Install build & build distributions
        if: steps.ver.outputs.skip != 'true'
        working-directory: python
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        if: steps.ver.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Commit version sync and push
        if: steps.ver.outputs.skip != 'true' && steps.ver.outputs.bump == 'true' && github.event_name != 'release'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add python/pyproject.toml
          git commit -m "chore: release ${{ steps.ver.outputs.tag }} [skip pypi]"
          git fetch origin main
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            git rebase origin/main
          fi
          git push origin "HEAD:refs/heads/main"
          TAG="${{ steps.ver.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
