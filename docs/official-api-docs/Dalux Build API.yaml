  /1.0/projects/{projectId}/file_areas/{fileAreaId}/upload:
    parameters:
      - $ref: >-
          https://api.swaggerhub.com/domains/Dalux/BuildCommon/4.0#/components/parameters/projectId
      - $ref: '#/components/parameters/fileAreaId'
    post:
      tags:
        - File upload
      summary: Create a new upload slot and return a GUID pointing to that slot
      operationId: createUpload
      description: >-
        Returns a GUID pointing to a new file upload slot (fileAreaId query
        parameter cannot reference a file area of type published or shared)
      responses:
        '201':
          description: Upload slot created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ObjectResponse
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UploadGuid'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /1.0/projects/{projectId}/file_areas/{fileAreaId}/upload
      method: POST
  /1.0/projects/{projectId}/file_areas/{fileAreaId}/upload/{uploadGuid}:
    parameters:
      - $ref: >-
          https://api.swaggerhub.com/domains/Dalux/BuildCommon/4.0#/components/parameters/projectId
      - $ref: '#/components/parameters/fileAreaId'
      - $ref: '#/components/parameters/uploadGuid'
      - in: header
        name: Content-Disposition
        description: >-
          filename should be the filename and file extension for the file.
          Requires URI encoding if it contains non-ASCII characters.
        required: true
        schema:
          type: object
          format: >-
            Content-Disposition: form-data; filename=<filename>;
            filename*=UTF-8''<URIencoded_filename>
          example: form-data; filename='filename.txt'; filename*=UTF-8''file%20name.txt
      - in: header
        name: Content-Range
        description: >-
          The indices of the bytes of the part of the file being uploaded, along
          with the total number of bytes
        required: true
        schema:
          type: object
          format: 'Content-Range: bytes <start index>-<end index>/<total bytes>'
          example: bytes 0-255/256
    post:
      tags:
        - File upload
      summary: Upload a part of a file
      operationId: uploadFilePart
      description: >-
        Upload a part of a file to a slot specified by the GUID. The size of
        each uploaded part cannot exceed 104857600 bytes (fileAreaId query
        parameter cannot reference a file area of type published or shared)
      requestBody:
        description: A chunk of the file being uploaded as a byte array
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: byte
      responses:
        '202':
          description: Part uploaded
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /1.0/projects/{projectId}/file_areas/{fileAreaId}/upload/{uploadGuid}
      method: POST
  /2.0/projects/{projectId}/file_areas/{fileAreaId}/upload/{uploadGuid}/finalize:
    parameters:
      - $ref: >-
          https://api.swaggerhub.com/domains/Dalux/BuildCommon/4.0#/components/parameters/projectId
      - $ref: '#/components/parameters/fileAreaId'
      - $ref: '#/components/parameters/uploadGuid'
    post:
      tags:
        - File upload
      summary: Finish uploading a file
      operationId: finishUpload
      description: >-
        Finalize the upload of the file associated with the GUID, and supply
        file metadata. Only the properties fileId, folderId, properties,
        fileType and fileName are considered in the metadata. Either fileId or
        folderId can be set, but not both. If fileId is set, a new version of
        the corresponding file is uploaded. If folderId is set, a new file is
        uploaded to that folder. (fileAreaId query parameter cannot reference a
        file area of type published or shared)
      requestBody:
        description: File metadata
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/File'
                - type: object
                  description: >
                    The properties and metadata of the file being uploaded. If a
                    fileId is included, the upload will act as a new revision of
                    the file. Only the properties fileId, folderId, properties,
                    fileType and fileName are considered.

                    Either fileId or folderId can be set, but not both. If
                    fileId is set, a new version of the corresponding file is
                    uploaded. If folderId is set, a new file is uploaded to that
                    folder.
      responses:
        '201':
          description: New file uploaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ObjectResponse
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/File'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: >-
        /2.0/projects/{projectId}/file_areas/{fileAreaId}/upload/{uploadGuid}/finalize
      method: POST
