  /1.1/projects/{projectId}/file_areas/{fileAreaId}/folders/{folderId}/files/properties/1.0/mappings:
    parameters:
      - $ref: >-
          https://api.swaggerhub.com/domains/Dalux/BuildCommon/4.0#/components/parameters/projectId
