      tags:
        - Folders
      summary: Retrieve all properties for each file type in a specific folder
      operationId: getFolderFilesProperties
      description: >-
        Returns the properties mapping for a specific folder, for each file
        type, noting if properties are required.
      responses:
        '200':
          description: The requested properties mapping
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ListResponse
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          allOf:
                            - $ref: >-
                                https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ObjectResponse
                            - type: object
