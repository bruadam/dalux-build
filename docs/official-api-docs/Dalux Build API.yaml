components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
  parameters:
    folderId:
      name: folderId
      in: path
      schema:
        type: string
      required: true
      description: The ID of the folder
    fileAreaId:
      name: fileAreaId
      in: path
      schema:
        type: string
      required: true
      description: The ID of the file area
    fileId:
      name: fileId
      in: path
      schema:
        type: string
      required: true
      description: The ID of the file
    fileRevisionId:
      name: fileRevisionId
      in: path
      schema:
        type: string
      required: true
      description: The ID of the file revision
    versionSetId:
      name: versionSetId
      in: path
      schema:
        type: string
      required: true
      description: The ID of the version set
    filePropertyId:
      name: filePropertyId
      in: path
      schema:
        type: string
      required: true
      description: The ID of the file property
    uploadGuid:
      name: uploadGuid
      in: path
      schema:
        type: string
      required: true
      description: Guid of the upload slot
    taskId:
      name: taskId
      in: path
      schema:
        type: string
      required: true
      description: The ID of the task/approval/safety issue/safety observation
    formId:
      name: formId
      in: path
      schema:
        type: string
      required: true
      description: The ID of the form
    catalogCompanyId:
      name: catalogCompanyId
      in: path
      schema:
        type: string
      required: true
      description: The ID of the company
  schemas:
    User:
      type: object
      properties:
        userId:
          type: string
        userType:
          type: string
          enum:
            - end_user
            - api_identity
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
    ProjectUser:
      type: object
      allOf:
        - $ref: '#/components/schemas/User'
      properties:
        companyId:
          type: string
    PostProject:
      type: object
      properties:
        projectName:
          type: string
        address:
          type: string
        number:
          type: string
        type:
          type: string
          enum:
            - building
            - infrastructure
        projectTemplateId:
          type: string
        metadata:
          type: array
          items:
            $ref: '#/components/schemas/ProjectMetadata'
    PatchProject:
      type: object
      properties:
        projectName:
          type: string
        address:
          type: string
        number:
          type: string
        metadata:
          type: array
          items:
            $ref: '#/components/schemas/ProjectMetadata'
    Project:
      type: object
      properties:
        projectId:
          type: string
        projectName:
          type: string
        type:
          type: string
          enum:
            - building
            - infrastructure
        projectTemplateId:
          type: string
        address:
          type: string
        number:
          type: string
        created:
          type: string
          format: date-time
        closing:
          type: string
          format: date-time
        modules:
          type: array
          items:
            $ref: '#/components/schemas/ProjectModule'
    ProjectTemplate:
      type: object
      properties:
        projectTemplateId:
          type: string
        name:
          type: string
    FileArea:
      properties:
        fileAreaId:
          type: string
        fileAreaName:
          type: string
        fileAreaType:
          type: string
          enum:
            - files
            - shared
            - published
    VersionSet:
      properties:
        versionSetId:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - locked
            - unlocked
        fileAreaId:
          type: string
    File:
      properties:
        fileId:
          type: string
        fileRevisionId:
          type: string
        fileName:
          type: string
        fileAreaId:
          type: string
        folderId:
          type: string
        uploadedByUserId:
          type: string
          description: >-
            For files in file areas of type shared or published, the userId
            corresponds to the id of the user who shared or published the file,
            respectively
        uploaded:
          type: string
          format: date
          description: >-
            Should be in the format yyyy-MM-dd. For files in file areas of type
            shared or published, the uploaded date corresponds to the date the
            file was shared or published, respectively.
          example: '2017-03-13'
        lastModifiedByUserId:
          type: string
        lastModified:
          type: string
          format: date
          description: Should be in the format yyyy-MM-dd.
          example: '2017-03-13'
        version:
          type: string
          description: >-
            For files in file areas of type shared or published, the version
            corresponds to the revision number
        deleted:
          type: boolean
          example: false
        fileType:
          type: string
          enum:
            - document
            - drawing
            - model
        fileSize:
          type: integer
          format: int64
          description: Filesize in bytes
        contentHash:
          type: string
        downloadLink:
          type: string
          description: >-
            The url should be considered as an opaque link to download the
            contents of the file. Attempting to download a deleted file will be
            rejected by the system. The link requires using the API key in the
            header.
        properties:
          type: array
          items:
            $ref: '#/components/schemas/FilePropertyField'
    FilePropertyField:
      type: object
      properties:
        key:
          type: string
        name:
          type: string
        values:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/FileIntegerProperty'
              - $ref: '#/components/schemas/FileDateProperty'
              - $ref: '#/components/schemas/FileTextProperty'
              - $ref: '#/components/schemas/FileReferenceProperty'
          example:
            - text: Some text
    FileIntegerProperty:
      type: object
      properties:
        integer:
          type: number
          example: 42
    FileDateProperty:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Should be in the format yyyy-MM-dd.
          example: '2017-03-13'
    FileTextProperty:
      type: object
      properties:
        text:
          type: string
          example: Some text
    FileReferenceProperty:
      type: object
