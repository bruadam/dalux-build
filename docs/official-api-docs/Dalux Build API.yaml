              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ObjectResponse
                properties:
                  data:
                    $ref: '#/components/schemas/ProjectUser'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /1.1/projects/{projectId}/users/{userId}
      method: GET
  /1.1/users/{userId}:
    get:
      tags:
        - Users
      operationId: getUser
      summary: Get a specific user
      parameters:
        - name: userId
          in: path
          schema:
            type: string
          required: true
          description: The ID of the user
      responses:
        '200':
          description: The user with the given ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ObjectResponse
                properties:
                  data:
                    $ref: '#/components/schemas/User'
