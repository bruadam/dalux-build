      path: /1.2/projects/{projectId}/users
      method: GET
  /1.1/projects/{projectId}/users/{userId}:
    get:
      tags:
        - Users
      operationId: getProjectUser
      summary: Get user on project
      parameters:
        - name: projectId
          in: path
          schema:
            type: string
          required: true
          description: The ID of the project
        - name: userId
          in: path
          schema:
            type: string
          required: true
          description: The ID of the user on the project
      responses:
        '200':
          description: The users on the project with the given ID
          content:
