openapi: 3.0.0
info:
  title: Dalux Build API
  contact:
    email: support@dalux.com
  version: '4.14'
  description: >
    # Getting started

    To access data objects through a service, a customer specific API key is
    required. Contact <support@dalux.com> to activate the API for your company
    profile if you have not done so already. The key is tied to individual API
    identities found in settings under API identities.


    # Calling a service

    The documentation only provides a part of the url specified for requests,
    e.g.


    `GET /4.0/projects`


    To complete the request, you must append the API base url. The base URL is
    optained by contacting <support@dalux.com>. to get all projects, you would
    call


    `{BASE_URL}/4.0/projects`


    Authorization is provided by adding your API key to a header parameter
    called ‘X-API-KEY’


    Example with curl


    `curl GET '{BASE_URL}/4.0/projects' --header 'X-API-KEY: {YOUR_API_KEY}'`


    # Common object model


    Dalux expose a number of API's. They share an overarching object
    architecture which is described in a [Common object
    model](https://app.swaggerhub.com/apis-docs/Dalux/GettingStarted/2.0)
security:
  - ApiKeyAuth: []
paths:
  /5.1/projects:
    get:
      tags:
        - Projects
      operationId: listProjects
      summary: Get all available projects
      description: Get all available projects
      responses:
        '200':
          description: A list of available projects
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ListResponse
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.1#/components/schemas/totalItemsMetadata
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      allOf:
                        - $ref: >-
                            https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/Response
                        - type: object
                      properties:
                        data:
                          $ref: '#/components/schemas/Project'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /5.1/projects
      method: GET
  /5.0/projects:
    post:
      tags:
        - Projects
      operationId: postProject
      summary: Create a new project
      description: >-
        Creates a new project. The created project will follow the default
        project language, measurement unit and time zone set in the company
        settings, as well as the Field and Box configuration that has been
        defined for the company.
      parameters:
        - in: query
          name: adminEmail
          schema:
            type: string
          required: true
          description: The specified email must be the email of an existing Dalux user
      requestBody:
        description: >
          projectId property is irrelevant and ignored when calling POST.


          Infrastructure project type is only allowed if the company has the
          ability to create infrastructure projects.


          ⚠️ NOTE: When adding metadata to a project, there are two types of
          metadata

          - For list-type metadata, provide the metadata key and a reference key
          as value.

          - For text-type metadata, provide the metadata key and a text value.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostProject'
      responses:
        '200':
          description: Successfully created a new project
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ObjectResponse
                  - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /5.0/projects
      method: POST
  /5.0/projects/{projectId}:
    parameters:
      - $ref: >-
          https://api.swaggerhub.com/domains/Dalux/BuildCommon/4.0#/components/parameters/projectId
    get:
      tags:
        - Projects
      operationId: getProject
      summary: Get a specific project
      responses:
        '200':
          description: The project with the given ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ObjectResponse
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /5.0/projects/{projectId}
      method: GET
    patch:
      tags:
        - Projects
      operationId: patchProject
      summary: update a project
      description: Updates a project
      requestBody:
        description: >-
          Generally you should be able to GET a project, change the fields that
          you want to alter and then PATCH the object. Fields not described by
          the documentation will be ignored (fx the object id field).
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProject'
      responses:
        '200':
          description: Successfully updated project
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ObjectResponse
                  - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /5.0/projects/{projectId}
      method: PATCH
  /1.0/projects/{projectId}/metadata:
    parameters:
      - $ref: >-
          https://api.swaggerhub.com/domains/Dalux/BuildCommon/4.0#/components/parameters/projectId
    get:
      tags:
        - Projects
      operationId: listProjectMetadata
      summary: Get metadata of a specific project
      responses:
        '200':
          description: The metadata of a project with the given ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ListResponse
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectMetadata'
      path: /1.0/projects/{projectId}/metadata
      method: GET
  /1.0/projects/metadata/1.0/mappings:
    get:
      tags:
        - Projects
      operationId: listMetadataMappingsForProjects
      summary: Get all metadata available for POST project operations
      description: >-
        Get all user defined metadata fields available for POST project
        operations
      responses:
        '200':
          description: A list of available metadata fields
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ListResponse
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      allOf:
                        - $ref: >-
                            https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/Response
                        - type: object
                      properties:
                        data:
                          $ref: '#/components/schemas/BasicFieldMapping'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /1.0/projects/metadata/1.0/mappings
      method: GET
  /1.0/projects/metadata/1.0/mappings/{key}/values:
    parameters:
      - in: path
        name: key
        description: The key of the field
        required: true
        schema:
          type: string
    get:
      tags:
        - Projects
      operationId: listMetadataValuesForProjects
      summary: Get available values for metadata in POST project operation
      description: >-
        Get all possible values for user defined metadata field POST project
        operation
      responses:
        '200':
          description: A list of available metadata field values
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ListResponse
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectMetadataFieldValue'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /1.0/projects/metadata/1.0/mappings/{key}/values
      method: GET
  /1.0/projects/{projectId}/metadata/1.0/mappings:
    parameters:
      - $ref: >-
          https://api.swaggerhub.com/domains/Dalux/BuildCommon/4.0#/components/parameters/projectId
    get:
      tags:
        - Projects
      operationId: listProjectMetadataMappings
      summary: Get all metadata available for PATCH project operations
      description: >-
        Get all user defined metadata fields available for PATCH project
        operations
      responses:
        '200':
          description: A list of available metadata fields
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ListResponse
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      allOf:
                        - $ref: >-
                            https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/Response
                        - type: object
                      properties:
                        data:
                          $ref: '#/components/schemas/BasicFieldMapping'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /1.0/projects/{projectId}/metadata/1.0/mappings
      method: GET
  /1.0/projects/{projectId}/metadata/1.0/mappings/{key}/values:
    parameters:
      - $ref: >-
          https://api.swaggerhub.com/domains/Dalux/BuildCommon/4.0#/components/parameters/projectId
      - in: path
        name: key
        description: The key of the field
        required: true
        schema:
          type: string
    get:
      tags:
        - Projects
      operationId: listProjectMetadataValues
      summary: Get available values for metadata in PATCH project operation
      description: >-
        Get all possible values for user defined metadata field for PATCH
        project operations
      responses:
        '200':
          description: A list of available metadata field values
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
