      path: /1.1/users/{userId}
      method: GET
  /3.1/projects/{projectId}/companies:
    parameters:
      - $ref: >-
          https://api.swaggerhub.com/domains/Dalux/BuildCommon/4.0#/components/parameters/projectId
    get:
      tags:
        - Companies
      operationId: listProjectCompanies
      description: Get companies on project
      responses:
        '200':
          description: companies on project
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ListResponse
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.1#/components/schemas/totalItemsMetadata
                  - type: object
                properties:
                  items:
                    items:
                      $ref: '#/components/schemas/ProjectCompany'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /3.1/projects/{projectId}/companies
      method: GET
    post:
      tags:
        - Companies
      operationId: postProjectCompany
      description: Add company to project
      requestBody:
        required: true
        description: >-
          Assign a valid company id from the company-catalog to the
          catalogCompanyId, in order to establish a link between this company
          and one listed in the company-catalog. Linking will import name,
          vatNumber and address from the corresponding company in the
          company-catalog. Changing the vatNumber on a linked company will
          unlink the company from the company-catalog.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCompany'
      responses:
        '200':
          description: Successfully created a new company
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ObjectResponse
                  - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProjectCompany'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /3.1/projects/{projectId}/companies
      method: POST
  /3.0/projects/{projectId}/companies/{companyId}:
    parameters:
      - $ref: >-
          https://api.swaggerhub.com/domains/Dalux/BuildCommon/4.0#/components/parameters/projectId
      - in: path
        name: companyId
        description: ID of the company
        required: true
        schema:
          type: string
    get:
      tags:
        - Companies
      operationId: getProjectCompany
      description: Get company on the project with the corresponding companyId
      responses:
        '200':
          description: company on project
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ObjectResponse
                  - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProjectCompany'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /3.0/projects/{projectId}/companies/{companyId}
      method: GET
    patch:
      tags:
        - Companies
      operationId: patchProjectCompany
      description: Update company on the project with corresponding companyId
      requestBody:
        required: true
        description: >-
          Assign a valid company id from the company-catalog to the
          catalogCompanyId, in order to establish a link between this company
          and one listed in the company-catalog. Linking will import name,
          vatNumber and address from the corresponding company in the
          company-catalog. Changing the vatNumber on a linked company will
          unlink the company from the company-catalog.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCompany'
      responses:
        '200':
          description: company on project
          content:
            application/json:
              schema:
                allOf:
                  - $ref: >-
                      https://api.swaggerhub.com/domains/Dalux/Blossom/3.0#/components/schemas/ObjectResponse
                  - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProjectCompany'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /3.0/projects/{projectId}/companies/{companyId}
      method: PATCH
