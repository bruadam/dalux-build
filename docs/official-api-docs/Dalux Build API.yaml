                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectMetadataFieldValue'
        '400':
          description: >-
            See the "Getting Started" introduction page for more information on
            error responses
      path: /1.0/projects/{projectId}/metadata/1.0/mappings/{key}/values
      method: GET
  /1.2/projects/{projectId}/users:
    get:
      tags:
        - Users
      operationId: listProjectUsers
